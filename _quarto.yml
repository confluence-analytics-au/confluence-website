project:
  type: website
  output-dir: docs

website:
  title: "Confluence Analytics"
  description: "Insights for a complex and changing world"
  site-url: "https://confluenceanalytics.com.au"
  favicon: "logo-01.png"
  
  navbar:
    title: false
    logo: "logo_words-01.png"
    logo-alt: "Confluence Analytics Logo"
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - href: contact.qmd
        text: Contact
    right:
      - icon: envelope
        href: mailto:info@confluenceanalytics.com.au
        text: Email
  
  page-footer:
    left: "© 2026 Confluence Analytics. All rights reserved."
    center: "Professional ecological and agricultural management consulting"
    right:
      - icon: envelope
        href: mailto:info@confluenceanalytics.com.au

format:
  html:
    theme:
      - cosmo
      - styles.css
    css: styles.css
    toc: true
    toc-depth: 3
    smooth-scroll: true
    link-external-newwindow: true
    number-sections: false
    
    # SEO and meta
    page-layout: full
    title-block-banner: true
    
    # Code
    code-fold: true
    code-tools: false



